    <!-- Lightbox -->
    <div class="lightbox" id="lightbox">
        <button class="lightbox-close" id="lightbox-close">&times;</button>
        <button class="lightbox-prev" id="lightbox-prev">&#8249;</button>
        <img class="lightbox-img" id="lightbox-img" src="" alt="Expanded photo">
        <button class="lightbox-next" id="lightbox-next">&#8250;</button>
    </div>

    <footer class="site-footer">
        <div class="container">
            <p>&copy; 2026 Manavjeet Singh</p>
        </div>
    </footer>

    <script>
        const cards = Array.from(document.querySelectorAll('.ig-card'));
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');
        let current = 0;

        function open(index) {
            current = index;
            lightboxImg.src = cards[current].dataset.src;
            lightbox.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function close() {
            lightbox.classList.remove('active');
            document.body.style.overflow = '';
        }

        function prev() { open((current - 1 + cards.length) % cards.length); }
        function next() { open((current + 1) % cards.length); }

        cards.forEach((card, i) => card.addEventListener('click', () => open(i)));
        document.getElementById('lightbox-close').addEventListener('click', close);
        document.getElementById('lightbox-prev').addEventListener('click', prev);
        document.getElementById('lightbox-next').addEventListener('click', next);
        lightbox.addEventListener('click', e => { if (e.target === lightbox) close(); });
        document.addEventListener('keydown', e => {
            if (!lightbox.classList.contains('active')) return;
            if (e.key === 'Escape') close();
            if (e.key === 'ArrowLeft') prev();
            if (e.key === 'ArrowRight') next();
        });
    </script>
